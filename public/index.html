<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPI Engine Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; border-bottom: 2px solid #0f3460; margin-bottom: 30px; }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .subtitle { color: #888; font-size: 1rem; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card-title {
            font-size: 1.2rem;
            color: #00d9ff;
            margin-bottom: 20px;
        }
        .upload-area {
            border: 2px dashed #0f3460;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover { border-color: #00d9ff; background: rgba(0, 217, 255, 0.05); }
        .upload-area.dragover { border-color: #00ff88; background: rgba(0, 255, 136, 0.1); }
        .upload-icon { font-size: 3rem; margin-bottom: 10px; }
        .upload-text { color: #888; }
        .file-input { display: none; }
        .file-name { color: #00ff88; font-weight: bold; margin-top: 10px; }
        .rules-container { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .rule-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .rule-tag .remove { cursor: pointer; color: #ff6b6b; font-weight: bold; }
        .add-rule-form { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        select, input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            flex: 1;
        }
        select:focus, input:focus { outline: none; border-color: #00d9ff; }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: #888; font-size: 0.9rem; margin-top: 5px; }
        .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .app-list, .domain-list { max-height: 300px; overflow-y: auto; }
        .app-item, .domain-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .app-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }
        .app-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 4px;
        }
        .domain-name { color: #00ff88; font-family: monospace; }
        .loading { display: none; text-align: center; padding: 50px; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DPI Engine Dashboard</h1>
            <p class="subtitle">Deep Packet Inspection - Network Traffic Analyzer</p>
        </header>
        
        <div class="card">
            <div class="card-title">Upload PCAP File</div>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📁</div>
                <div class="upload-text">Click or drag & drop a .pcap file here</div>
                <input type="file" class="file-input" id="fileInput" accept=".pcap">
                <div class="file-name" id="fileName"></div>
            </div>
            
            <div class="add-rule-form">
                <select id="ruleType">
                    <option value="app">Block App</option>
                    <option value="domain">Block Domain</option>
                </select>
                <select id="ruleAppValue" style="display:none;">
                    <option value="">Select app...</option>
                    <option value="YouTube">YouTube</option>
                    <option value="Facebook">Facebook</option>
                    <option value="Netflix">Netflix</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Instagram">Instagram</option>
                    <option value="Twitter">Twitter/X</option>
                    <option value="Discord">Discord</option>
                    <option value="Spotify">Spotify</option>
                </select>
                <input type="text" id="ruleValue" placeholder="Enter domain (e.g., example.com)">
                <button class="btn btn-primary" onclick="addRule()">+ Add Rule</button>
            </div>
            
            <div class="rules-container" id="rulesContainer" style="margin-top:15px;"></div>
            
            <div style="text-align: center; margin-top: 25px;">
                <button class="btn btn-primary" id="runBtn" onclick="runAnalysis()" disabled>
                    Run Analysis
                </button>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Analyzing packets...</p>
        </div>
        
        <div id="results" class="hidden">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalPackets">0</div>
                    <div class="stat-label">Total Packets</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="forwarded">0</div>
                    <div class="stat-label">Forwarded</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="dropped">0</div>
                    <div class="stat-label">Dropped</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="detectedApps">0</div>
                    <div class="stat-label">Domains Found</div>
                </div>
            </div>
            
            <div class="results-grid">
                <div class="card">
                    <div class="card-title">Traffic by Application</div>
                    <div class="app-list" id="appList"></div>
                </div>
                <div class="card">
                    <div class="card-title">Detected Domains / SNIs</div>
                    <div class="domain-list" id="domainList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let selectedFile = null;
        let rules = [];
        let trafficChart = null;
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const runBtn = document.getElementById('runBtn');
        const ruleType = document.getElementById('ruleType');
        const ruleValue = document.getElementById('ruleValue');
        const ruleAppValue = document.getElementById('ruleAppValue');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.pcap')) {
                handleFile(file);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });
        
        function handleFile(file) {
            selectedFile = file;
            fileName.textContent = file.name;
            runBtn.disabled = false;
        }
        
        ruleType.addEventListener('change', () => {
            if (ruleType.value === 'app') {
                ruleValue.style.display = 'none';
                ruleAppValue.style.display = 'block';
            } else {
                ruleValue.style.display = 'block';
                ruleAppValue.style.display = 'none';
            }
        });
        
        function addRule() {
            const type = ruleType.value;
            let value = type === 'app' ? ruleAppValue.value : ruleValue.value;
            if (!value) return;
            rules.push({ type, value });
            renderRules();
            ruleValue.value = '';
            ruleAppValue.value = '';
        }
        
        function removeRule(index) {
            rules.splice(index, 1);
            renderRules();
        }
        
        function renderRules() {
            const container = document.getElementById('rulesContainer');
            container.innerHTML = rules.map((r, i) => `
                <div class="rule-tag">
                    <span>${r.type.toUpperCase()}: ${r.value}</span>
                    <span class="remove" onclick="removeRule(${i})">&times;</span>
                </div>
            `).join('');
        }
        
        async function runAnalysis() {
            if (!selectedFile) return;
            
            const btn = document.getElementById('runBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            btn.disabled = true;
            loading.style.display = 'block';
            results.classList.add('hidden');
            
            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
                
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        pcap_data: base64,
                        rules: rules
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                } else {
                    alert('Analysis failed: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        function displayResults(data) {
            const results = document.getElementById('results');
            results.classList.remove('hidden');
            
            document.getElementById('totalPackets').textContent = data.stats.total_packets;
            document.getElementById('forwarded').textContent = data.stats.forwarded;
            document.getElementById('dropped').textContent = data.stats.dropped;
            document.getElementById('detectedApps').textContent = data.detected_snis.length;
            
            renderAppList(data.app_breakdown);
            renderDomainList(data.detected_snis);
        }
        
        function renderAppList(breakdown) {
            const container = document.getElementById('appList');
            const maxCount = Math.max(...breakdown.map(a => a.count), 1);
            
            container.innerHTML = breakdown.map(app => `
                <div class="app-item">
                    <span>${app.name}</span>
                    <div class="app-bar">
                        <div class="app-bar-fill" style="width: ${(app.count / maxCount * 100)}%"></div>
                    </div>
                    <span>${app.count} (${app.percentage}%)</span>
                </div>
            `).join('');
        }
        
        function renderDomainList(domains) {
            const container = document.getElementById('domainList');
            if (domains.length === 0) {
                container.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">No domains detected</p>';
                return;
            }
            container.innerHTML = domains.map(d => `
                <div class="domain-item">
                    <span class="domain-name">${d.domain}</span>
                    <span>${d.app}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
