<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPI Engine Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #0f3460;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .card-title {
            font-size: 1.2rem;
            color: #00d9ff;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, #00d9ff, #00ff88);
            border-radius: 2px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        label {
            color: #888;
            font-size: 0.9rem;
        }
        
        select, input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #0f3460;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        select:focus, input:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.2);
        }
        
        .blocking-rules {
            margin-top: 20px;
        }
        
        .rules-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .rule-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid #ff6b6b;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        
        .rule-tag .remove {
            cursor: pointer;
            color: #ff6b6b;
            font-weight: bold;
        }
        
        .rule-tag .remove:hover {
            color: #fff;
        }
        
        .add-rule-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .add-rule-form select, .add-rule-form input {
            flex: 1;
            min-width: 150px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            color: #1a1a2e;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #00d9ff;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        
        .chart-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
            height: 300px;
        }
        
        .app-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .app-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .app-item:last-child {
            border-bottom: none;
        }
        
        .app-bar {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }
        
        .app-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .app-name {
            width: 100px;
            color: #ccc;
        }
        
        .app-count {
            width: 60px;
            text-align: right;
            color: #00d9ff;
            font-weight: 600;
        }
        
        .app-pct {
            width: 60px;
            text-align: right;
            color: #888;
            font-size: 0.85rem;
        }
        
        .domain-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .domain-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .domain-item:last-child {
            border-bottom: none;
        }
        
        .domain-name {
            color: #00ff88;
            font-family: monospace;
        }
        
        .domain-app {
            color: #888;
            font-size: 0.85rem;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none !important;
        }
        
        .blocked-badge {
            background: #ff6b6b;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #888;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        .pie-chart {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            position: relative;
        }

        .pie-chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .pie-chart-center .value {
            font-size: 2rem;
            font-weight: bold;
            color: #00d9ff;
        }

        .pie-chart-center .label {
            font-size: 0.8rem;
            color: #888;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>DPI Engine Dashboard</h1>
            <p class="subtitle">Deep Packet Inspection - Real-time Network Analysis</p>
        </header>
        
        <div class="card">
            <h2 class="card-title">Analysis Configuration</h2>
            <div class="controls">
                <div class="control-group">
                    <label>Input PCAP File</label>
                    <select id="inputFile">
                        <option value="">Select a file...</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Output File</label>
                    <input type="text" id="outputFile" value="output_demo.pcap" placeholder="output.pcap">
                </div>
            </div>
            
            <div class="blocking-rules">
                <label>Blocking Rules</label>
                <div class="rules-container" id="rulesContainer"></div>
                <div class="add-rule-form">
                    <select id="ruleType">
                        <option value="app">Block App</option>
                        <option value="domain">Block Domain</option>
                        <option value="ip">Block IP</option>
                    </select>
                    <select id="ruleAppValue" style="display:none;">
                        <option value="">Select app...</option>
                    </select>
                    <input type="text" id="ruleValue" placeholder="Enter value...">
                    <button class="btn btn-primary" onclick="addRule()">+ Add Rule</button>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 25px;">
                <button class="btn btn-primary" id="runBtn" onclick="runAnalysis()">
                    Run Analysis
                </button>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing packets...</p>
        </div>
        
        <div id="results" class="hidden">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalPackets">0</div>
                    <div class="stat-label">Total Packets</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="forwarded">0</div>
                    <div class="stat-label">Forwarded</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="dropped">0</div>
                    <div class="stat-label">Dropped</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="detectedApps">0</div>
                    <div class="stat-label">Apps Detected</div>
                </div>
            </div>
            
            <div class="results-grid">
                <div class="card">
                    <h2 class="card-title">Traffic Distribution</h2>
                    <div class="chart-container">
                        <canvas id="trafficChart"></canvas>
                    </div>
                    <div class="app-list" id="appList"></div>
                </div>
                
                <div class="card">
                    <h2 class="card-title">Detected Domains / SNIs</h2>
                    <div class="domain-list" id="domainList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let rules = [];
        let trafficChart = null;
        
        const appColors = {
            'YouTube': '#FF0000',
            'Facebook': '#4267B2',
            'Google': '#4285F4',
            'Instagram': '#E4405F',
            'Twitter': '#1DA1F2',
            'Netflix': '#E50914',
            'Amazon': '#FF9900',
            'Microsoft': '#00A4EF',
            'Apple': '#A2AAAD',
            'GitHub': '#333333',
            'Spotify': '#1DB954',
            'Discord': '#5865F2',
            'TikTok': '#000000',
            'WhatsApp': '#25D366',
            'Telegram': '#0088CC',
            'HTTPS': '#00d9ff',
            'HTTP': '#888888',
            'DNS': '#ffcc00',
            'Unknown': '#666666'
        };
        
        async function init() {
            await loadPCAPFiles();
            await loadApps();
            setupRuleTypeToggle();
        }
        
        async function loadPCAPFiles() {
            try {
                const response = await fetch('/api/pcap-files');
                const files = await response.json();
                const select = document.getElementById('inputFile');
                files.forEach(f => {
                    const option = document.createElement('option');
                    option.value = f.path;
                    option.textContent = `${f.name} (${formatSize(f.size)})`;
                    select.appendChild(option);
                });
                if (files.length > 0) {
                    select.value = files[0].path;
                }
            } catch (e) {
                console.error('Failed to load PCAP files:', e);
            }
        }
        
        async function loadApps() {
            try {
                const response = await fetch('/api/apps');
                const apps = await response.json();
                const select = document.getElementById('ruleAppValue');
                apps.forEach(app => {
                    const option = document.createElement('option');
                    option.value = app.name;
                    option.textContent = app.name;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error('Failed to load apps:', e);
            }
        }
        
        function setupRuleTypeToggle() {
            const ruleType = document.getElementById('ruleType');
            const ruleValue = document.getElementById('ruleValue');
            const ruleAppValue = document.getElementById('ruleAppValue');
            
            ruleType.addEventListener('change', () => {
                if (ruleType.value === 'app') {
                    ruleValue.style.display = 'none';
                    ruleAppValue.style.display = 'block';
                } else {
                    ruleValue.style.display = 'block';
                    ruleAppValue.style.display = 'none';
                }
            });
        }
        
        function addRule() {
            const type = document.getElementById('ruleType').value;
            let value;
            
            if (type === 'app') {
                value = document.getElementById('ruleAppValue').value;
            } else {
                value = document.getElementById('ruleValue').value;
            }
            
            if (!value) {
                alert('Please enter a value');
                return;
            }
            
            rules.push({ type, value });
            renderRules();
            
            document.getElementById('ruleValue').value = '';
            document.getElementById('ruleAppValue').value = '';
        }
        
        function removeRule(index) {
            rules.splice(index, 1);
            renderRules();
        }
        
        function renderRules() {
            const container = document.getElementById('rulesContainer');
            container.innerHTML = rules.map((r, i) => `
                <div class="rule-tag">
                    <span>${r.type.toUpperCase()}: ${r.value}</span>
                    <span class="remove" onclick="removeRule(${i})">&times;</span>
                </div>
            `).join('');
        }
        
        async function runAnalysis() {
            const btn = document.getElementById('runBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            btn.disabled = true;
            loading.style.display = 'block';
            results.classList.add('hidden');
            
            try {
                const response = await fetch('/api/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        input_file: document.getElementById('inputFile').value,
                        output_file: document.getElementById('outputFile').value,
                        rules: rules
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayResults(data);
                } else {
                    alert('Analysis failed: ' + (data.error || 'Unknown error'));
                }
            } catch (e) {
                alert('Error: ' + e.message);
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        function displayResults(data) {
            const results = document.getElementById('results');
            results.classList.remove('hidden');
            
            document.getElementById('totalPackets').textContent = data.stats.total_packets;
            document.getElementById('forwarded').textContent = data.stats.forwarded;
            document.getElementById('dropped').textContent = data.stats.dropped;
            document.getElementById('detectedApps').textContent = data.detected_snis.length;
            
            renderAppList(data.app_breakdown);
            renderTrafficChart(data.app_breakdown);
            renderDomainList(data.detected_snis);
        }
        
        function renderAppList(breakdown) {
            const container = document.getElementById('appList');
            const maxCount = Math.max(...breakdown.map(a => a.count), 1);
            
            container.innerHTML = breakdown.map(app => `
                <div class="app-item">
                    <span class="app-name">${app.name}</span>
                    <div class="app-bar">
                        <div class="app-bar-fill" style="width: ${(app.count / maxCount * 100)}%; background: ${getAppColor(app.name)}"></div>
                    </div>
                    <span class="app-count">${app.count}</span>
                    <span class="app-pct">${app.percentage}%</span>
                </div>
            `).join('');
        }
        
        function getAppColor(appName) {
            return appColors[appName] || '#00d9ff';
        }
        
        function renderTrafficChart(breakdown) {
            const ctx = document.getElementById('trafficChart').getContext('2d');
            
            if (trafficChart) {
                trafficChart.destroy();
            }
            
            trafficChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: breakdown.map(a => a.name),
                    datasets: [{
                        data: breakdown.map(a => a.count),
                        backgroundColor: breakdown.map(a => getAppColor(a.name)),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#888',
                                padding: 10,
                                font: { size: 11 }
                            }
                        }
                    }
                }
            });
        }
        
        function renderDomainList(domains) {
            const container = document.getElementById('domainList');
            
            if (domains.length === 0) {
                container.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">No domains detected</p>';
                return;
            }
            
            container.innerHTML = domains.map(d => `
                <div class="domain-item">
                    <span class="domain-name">${d.domain}</span>
                    <span class="domain-app">${d.app}</span>
                </div>
            `).join('');
        }
        
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        init();
    </script>
</body>
</html>
